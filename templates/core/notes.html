{% extends 'base.html' %}
{% load static %}

{% block title %}빠른 메모 - FOCUS{% endblock %}

{% block content %}
<div class="notes-page fade-in">
    <div class="subject-bar">
        <h2 class="section-label">나의 과목</h2>
        <div class="subject-scroll">
            <button class="add-subject-btn" onclick="openModal('subjectModal')">
                <i class="mdi mdi-plus"></i> 과목 추가
            </button>
            </div>
    </div>

    <div class="notes-container">
        <div class="notes-header">
            <h1 class="notes-title">모든 메모</h1>
            <button class="new-note-btn" onclick="openModal('noteModal')">
                <i class="mdi mdi-note-plus"></i> 새 메모
            </button>
        </div>

        {% if notes %}
            {% else %}
        <div class="notes-empty-state">
            <div class="empty-icon"><i class="mdi mdi-note-outline"></i></div>
            <h2>메모할 준비가 되셨나요?</h2>
            <p>위에서 과목을 선택하거나 새 과목을 만들어 메모를 시작하세요.</p>
            <button class="primary-btn" onclick="openModal('subjectModal')" style="margin-top: 1rem;">과목 생성</button>
        </div>
        {% endif %}
    </div>
</div>

<div class="modal-header"><h2>새 메모 생성</h2></div>
<label>메모 제목</label>
<input type="text" placeholder="제목을 입력하세요...">
<label>내용</label>
<textarea placeholder="메모 내용을 입력하세요..."></textarea>
{% endblock %}
